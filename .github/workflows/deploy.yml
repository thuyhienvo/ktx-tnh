name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # DP-01: cổng test — build & push image CHỈ chạy khi test Go xanh.
  # (Lưu ý: Render đang autoDeploy TỪ SOURCE nên job này chưa chặn được Render; muốn chặn thật
  #  owner phải đặt render.yaml autoDeploy:false + bật deploy hook gated. Xem .agents/bl_41.md.)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  # BL-42: cổng test DOM/frontend (Playwright qua Docker) — bắt lỗi giao diện mà test gọi-API không thấy
  # (thẻ bấm chết, popover vỡ, báo nhầm "chưa lưu", card-view). Dựng app + Postgres sạch rồi chạy.
  # CSDL rỗng nên vài assert phụ thuộc học viên tự BỎ QUA; login + BL-20 (thẻ drill-through) luôn chạy.
  dom-smoke:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ktx
          POSTGRES_PASSWORD: ktx_ci
          POSTGRES_DB: ktx
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ktx" --health-interval 5s --health-timeout 5s --health-retries 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build app
        run: go build -o /tmp/ktx ./cmd/server
      - name: Run app (nền) + chờ health
        env:
          DATABASE_URL: postgres://ktx:ktx_ci@localhost:5432/ktx
          JWT_SECRET: ci_test_secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: CiTestPass123
          PORT: "3000"
        run: |
          /tmp/ktx > /tmp/ktx.log 2>&1 &
          for i in $(seq 1 40); do curl -sf http://localhost:3000/api/health >/dev/null && break || sleep 1; done
          curl -sf http://localhost:3000/api/health || { echo "app không lên:"; cat /tmp/ktx.log; exit 1; }
      - name: DOM smoke (Playwright qua Docker)
        env:
          TEST_ADMIN_PASS: CiTestPass123
        run: bash tests/dom/run.sh

  build-and-deploy:
    needs: [test, dom-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Bước deploy Render đã TẮT: để Render tự bắt commit và deploy ---
      # - name: Trigger Render deploy
      #   env:
      #     HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      #   run: |
      #     if [ -n "$HOOK" ]; then
      #       curl -fsSL -X POST "$HOOK"
      #     fi

      - name: Xong
        run: echo "Image đã đẩy lên GHCR:${{ steps.img.outputs.name }}:latest — Render tự deploy."
