name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Bước deploy Render đã TẮT: để Render tự bắt commit và deploy ---
      # - name: Trigger Render deploy
      #   env:
      #     HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      #   run: |
      #     if [ -n "$HOOK" ]; then
      #       curl -fsSL -X POST "$HOOK"
      #     fi

      - name: Xong
        run: echo "Image đã đẩy lên GHCR:${{ steps.img.outputs.name }}:latest — Render tự deploy."
