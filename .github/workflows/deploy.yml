name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # DP-01: cổng test — build & push image CHỈ chạy khi test Go xanh.
  # (Lưu ý: Render đang autoDeploy TỪ SOURCE nên job này chưa chặn được Render; muốn chặn thật
  #  owner phải đặt render.yaml autoDeploy:false + bật deploy hook gated. Xem .agents/bl_41.md.)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Bước deploy Render đã TẮT: để Render tự bắt commit và deploy ---
      # - name: Trigger Render deploy
      #   env:
      #     HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      #   run: |
      #     if [ -n "$HOOK" ]; then
      #       curl -fsSL -X POST "$HOOK"
      #     fi

      - name: Xong
        run: echo "Image đã đẩy lên GHCR:${{ steps.img.outputs.name }}:latest — Render tự deploy."
