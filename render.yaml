# Cấu hình triển khai phase STAGING lên Render.
# CSDL: PostgreSQL của Supabase. Object storage: Supabase Storage (S3 protocol).
# Kiến trúc GIỐNG local (Postgres + S3), chỉ khác endpoint/credentials qua ENV.
# Các biến sync:false phải điền trong Render Dashboard > Environment.

services:
  - type: web
    name: ktx-tnh
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: COOKIE_SECURE           # Render phục vụ HTTPS -> cookie Secure
        value: "true"
      - key: DATABASE_URL            # Supabase session pooler (port 5432) — điền trong Dashboard
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD          # điền trong Dashboard (>=6 ký tự); admin đổi mật khẩu lần đầu
        sync: false
      - key: DORM_NAME
        value: "Ký túc xá Nội trú Esuhai"
      # ----- Object storage (S3) = Supabase Storage -----
      - key: S3_ENDPOINT
        value: https://sceuwqrpyungzkhohmvj.storage.supabase.co/storage/v1/s3
      - key: S3_REGION
        value: ap-southeast-1
      - key: S3_ACCESS_KEY           # S3 access key (Supabase > Storage > S3 keys) — điền Dashboard
        sync: false
      - key: S3_SECRET_KEY           # S3 secret key — điền Dashboard
        sync: false
      - key: S3_CCCD_BUCKET
        value: cccd
      - key: S3_INTRO_BUCKET
        value: intro
