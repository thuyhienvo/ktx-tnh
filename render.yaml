# Cấu hình triển khai lên Render (https://render.com)
# CSDL dùng PostgreSQL của Supabase (không tạo Postgres trên Render nữa).
# Các biến sync:false phải điền trong Render Dashboard > Environment.

services:
  - type: web
    name: ktx-tnh
    runtime: docker
    plan: free            # web service miễn phí (ngủ khi không dùng, tự thức khi truy cập)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL           # chuỗi kết nối Supabase (session pooler, port 5432) — điền trong Dashboard
        sync: false
      - key: JWT_SECRET             # tự sinh chuỗi bí mật ngẫu nhiên
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD         # đặt trong Dashboard; admin phải đổi mật khẩu ở lần đăng nhập đầu
        sync: false
      - key: DORM_NAME
        value: "Ký túc xá Nội trú Esuhai"
      # ----- Supabase Storage (ảnh CCCD + ảnh giới thiệu) -----
      - key: SUPABASE_URL
        value: https://sceuwqrpyungzkhohmvj.supabase.co
      - key: SUPABASE_SERVICE_KEY   # service_role key — điền trong Dashboard, KHÔNG commit
        sync: false
      - key: SUPABASE_CCCD_BUCKET
        value: cccd
      - key: SUPABASE_INTRO_BUCKET
        value: intro
